<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>材质提炼工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #e8c840;
    --accent2: #f0a030;
    --text: #e8e8f0;
    --text-muted: #7878a0;
    --green: #40c878;
    --red: #f05050;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 40px;
  }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 3px;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 300;
    line-height: 1.7;
  }

  /* Step cards */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 32px;
  }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    position: relative;
    transition: border-color 0.2s;
  }

  .step.active { border-color: var(--accent); }
  .step.done { border-color: var(--green); }

  .step-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .step-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .step.active .step-num { background: var(--accent); border-color: var(--accent); color: #000; }
  .step.done .step-num { background: var(--green); border-color: var(--green); color: #000; }

  .step-title {
    font-size: 15px;
    font-weight: 500;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(232, 200, 64, 0.04);
  }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 10px;
  }

  .upload-zone p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .upload-zone strong { color: var(--accent); }

  #file-input { display: none; }

  /* Config */
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  .field select, .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .field select:focus, .field input:focus {
    border-color: var(--accent);
  }

  .field select option { background: var(--surface2); }

  .separator-hint {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 16px;
    display: inline-block;
    margin: 0 4px;
  }

  .format-preview {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  .format-preview span { color: var(--accent); }

  /* Process button */
  .btn-process {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    margin-top: 16px;
  }

  .btn-process:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-process:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

  /* Progress */
  .progress-wrap {
    margin-top: 12px;
    display: none;
  }

  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* Preview table */
  .preview-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(46,46,56,0.6);
    color: var(--text);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(232,200,64,0.03); }

  td.highlight { color: var(--accent); font-weight: 500; }
  td.muted { color: var(--text-muted); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--accent);
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Download */
  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    margin-top: 16px;
  }

  .btn-download:hover {
    background: rgba(64, 200, 120, 0.08);
    transform: translateY(-1px);
  }

  /* Log */
  .log {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.8;
    margin-top: 12px;
  }

  .log .ok { color: var(--green); }
  .log .warn { color: var(--accent); }
  .log .err { color: var(--red); }

  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Excel 材质处理</div>
    <h1>材质<span>提炼</span>工具</h1>
    <p class="subtitle">
      自动从 F 列提炼主材质 → 填充 H 列（中文）& I 列（英文）<br>
      并在 J 列生成 <code style="color:var(--accent);font-family:'DM Mono'">铁/Iron</code> 格式合并字段
    </p>
  </header>

  <!-- Step 1: Upload -->
  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">上传 Excel 文件</div>
      </div>
      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">📂</div>
        <p><strong>点击选择</strong>或拖拽文件到此处</p>
        <p style="margin-top:6px;font-size:12px">支持 .xlsx / .xls 格式</p>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls">
      <div id="file-info" class="hidden" style="margin-top:12px;font-size:13px;color:var(--green);font-family:'DM Mono',monospace;"></div>
    </div>

    <!-- Step 2: Config -->
    <div class="step" id="step2">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">列配置</div>
      </div>
      <div class="config-grid">
        <div class="field">
          <label>材质来源列（F列）</label>
          <select id="col-source">
            <option value="5">F 列（默认）</option>
            <option value="4">E 列</option>
            <option value="6">G 列</option>
            <option value="7">H 列</option>
          </select>
        </div>
        <div class="field">
          <label>中文报关名列（C列）</label>
          <select id="col-zhname">
            <option value="2">C 列（默认）</option>
            <option value="1">B 列</option>
            <option value="3">D 列</option>
          </select>
        </div>
        <div class="field">
          <label>主材质输出列（H列）</label>
          <select id="col-h">
            <option value="7">H 列（默认）</option>
            <option value="8">I 列</option>
            <option value="9">J 列</option>
          </select>
        </div>
        <div class="field">
          <label>英文翻译输出列（I列）</label>
          <select id="col-i">
            <option value="8">I 列（默认）</option>
            <option value="7">H 列</option>
            <option value="9">J 列</option>
          </select>
        </div>
        <div class="field">
          <label>合并输出列（J列）</label>
          <select id="col-j">
            <option value="9">J 列（默认）</option>
            <option value="10">K 列</option>
            <option value="11">L 列</option>
          </select>
        </div>
        <div class="field">
          <label>合并分隔符</label>
          <input type="text" id="separator" value="/" maxlength="5" style="font-family:'DM Mono',monospace;font-size:16px;">
        </div>
      </div>
      <div class="format-preview">
        预览格式：<span id="preview-text">铁/Iron</span>
      </div>
    </div>

    <!-- Step 3: Process -->
    <div class="step" id="step3">
      <div class="step-header">
        <div class="step-num">3</div>
        <div class="step-title">处理并下载</div>
      </div>
      <button class="btn-process" id="btn-process" disabled>开始处理</button>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="progress-text" id="progress-text">处理中...</div>
      </div>
      <div class="log hidden" id="log"></div>
    </div>

    <!-- Step 4: Result -->
    <div class="step hidden" id="step4">
      <div class="step-header">
        <div class="step-num">4</div>
        <div class="step-title">处理结果</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">总行数</div></div>
        <div class="stat"><div class="stat-num" id="stat-filled">0</div><div class="stat-label">已填充</div></div>
        <div class="stat"><div class="stat-num" id="stat-inferred">0</div><div class="stat-label">推断填充</div></div>
      </div>
      <div class="preview-wrap">
        <table id="preview-table">
          <thead><tr id="preview-head"></tr></thead>
          <tbody id="preview-body"></tbody>
        </table>
      </div>
      <a class="btn-download" id="btn-download" href="#">
        ⬇ 下载处理后的文件
      </a>
    </div>
  </div>

</div>

<script>
// ─── Material extraction engine ───────────────────────────────────────────────
const MATERIAL_PRIORITY = [
  ['海草','海草'],['水葫芦','水葫芦草'],['柳条','柳条'],['藤','藤编'],
  ['不锈钢','不锈钢'],['铝合金','铝合金'],['铝','铝合金'],['合金','合金'],
  ['亚克力','亚克力'],['有机玻璃','亚克力'],['硅胶','硅胶'],['橡胶','橡胶'],
  ['玻璃纤维','玻璃纤维'],['玻璃','玻璃'],['陶瓷','陶瓷'],['搪胶','搪胶'],
  ['树脂','树脂'],['pu皮','人造革'],['皮革','人造革'],['皮质','人造革'],
  ['缎面','缎面'],['天鹅绒','涤纶'],['绒布','涤纶'],['棉麻','棉麻'],
  ['棉布','棉布'],['棉','棉布'],['帆布','帆布'],['麻布','麻布'],
  ['牛津布','涤纶'],['尼龙','尼龙'],['涤纶','涤纶'],['氨纶','涤纶'],
  ['布','涤纶'],['金属','铁'],['铁','铁'],['竹木','竹木'],['竹','竹木'],
  ['松木','木'],['榉木','木'],['木','木'],
  ['塑料','塑料'],['pvc','塑料'],['eva','塑料'],['pet','塑料'],
  ['tpu','TPU'],['pp','塑料'],['pe','塑料'],['hips','塑料'],
  ['纸板','纸板'],['纸','纸'],['磁铁','铁'],['毛毡','毛毡'],
  ['黄麻','黄麻'],['氯丁','氯丁橡胶'],
];

const SIMPLE_MAP = {
  '铁':'铁','竹木':'竹木','棉布':'棉布','棉麻':'棉麻','帆布':'帆布',
  '涤纶':'涤纶','塑料':'塑料','合金':'合金','金属':'铁','不锈钢':'不锈钢',
  '铝合金':'铝合金','海草':'海草','柳条':'柳条','玻璃':'玻璃','亚克力':'亚克力',
  '硅胶':'硅胶','橡胶':'橡胶','陶瓷':'陶瓷','纸板':'纸板','纸':'纸',
  '麻布':'麻布','人造革':'人造革','尼龙':'尼龙','搪胶':'搪胶','木':'木',
  '竹':'竹木','铁艺':'铁','铁（香槟色）':'铁','铁（黑色）':'铁','铁（银色）':'铁',
  '塑料（PE）':'塑料','TPU':'TPU','PET':'塑料',
};

const PRODUCT_RULES = [
  [['阻燃袋','防火袋'],'涤纶'],[['浴帘'],'涤纶'],
  [['坐垫','车座','单车座','自行车座'],'涤纶'],
  [['护膝','护肘','护腿套'],'涤纶'],[['自行车裤','骑行裤'],'涤纶'],
  [['车罩','自行车罩','摩托车罩'],'涤纶'],
  [['收纳袋','收纳包','化妆包','防水袋'],'涤纶'],
  [['拼图'],'纸板'],[['钻石画','数字油画'],'塑料'],
  [['灯串','风铃灯','霓虹灯'],'塑料'],[['试管'],'玻璃'],
  [['相框'],'铁'],[['假植','仿真植物'],'塑料'],
  [['首饰','项链','耳环','吊坠'],'合金'],
];

const SKU_PREFIX = {
  'BI':'铁','HM':'铁','LT':'塑料','SP':'涤纶','BT':'涤纶','PT':'塑料',
  'AC':'塑料','OS':'纸','TY':'纸板','CL':'涤纶','OD':'涤纶','KC':'柳条',
  'GP':'玻璃','IT':'塑料','PJ':'涤纶','HP':'涤纶',
};

const TRANS = {
  '铁':'Iron','竹木':'Bamboo','棉布':'Cotton','棉麻':'Cotton Linen',
  '帆布':'Canvas','涤纶':'Polyester','塑料':'Plastic','合金':'Alloy',
  '不锈钢':'Stainless Steel','铝合金':'Aluminum Alloy','海草':'Seagrass',
  '柳条':'Wicker','玻璃':'Glass','亚克力':'Acrylic','硅胶':'Silicone',
  '橡胶':'Rubber','陶瓷':'Ceramic','纸板':'Cardboard','纸':'Paper',
  '麻布':'Burlap','人造革':'PU Leather','尼龙':'Nylon','搪胶':'Rubber',
  '木':'Wood','藤编':'Rattan','水葫芦草':'Water Hyacinth','金属':'Metal',
  '玻璃纤维':'Fiberglass','缎面':'Satin','氯丁橡胶':'Neoprene',
  '黄麻':'Jute','毛毡':'Felt','TPU':'TPU','磁性材料':'Magnetic Material',
  '树脂':'Resin',
};

function scanForMaterial(text) {
  const t = (text||'').toLowerCase();
  for (const [kw, mat] of MATERIAL_PRIORITY) {
    if (t.includes(kw.toLowerCase())) return mat;
  }
  return null;
}

function extractMain(matF, zhName, prodName, enName, sku) {
  // Step 1: Use F column
  if (matF && matF.trim() && matF.trim() !== 'nan') {
    const m = matF.replace(/\t/g,'').trim();
    if (SIMPLE_MAP[m]) return [SIMPLE_MAP[m], false];
    // Complex: scan F string
    const found = scanForMaterial(m);
    if (found) return [found, false];
    // Take first token
    for (const sep of ['、',',','，','；',';','+','（','(']) {
      if (m.includes(sep)) {
        const first = m.split(sep)[0].trim();
        const f2 = scanForMaterial(first);
        if (f2) return [f2, false];
        if (first) return [first, false];
      }
    }
    return [m, false];
  }
  // Step 2: infer from product context
  const ctx = (zhName||'') + (prodName||'') + (enName||'');
  for (const [kws, mat] of PRODUCT_RULES) {
    for (const kw of kws) { if (ctx.includes(kw)) return [mat, true]; }
  }
  const found = scanForMaterial(ctx);
  if (found) return [found, true];
  // Step 3: SKU prefix
  const pre = (sku||'').substring(0,2).toUpperCase();
  return [SKU_PREFIX[pre] || '塑料', true];
}

function translate(cn) {
  return TRANS[cn] || cn;
}

// ─── File handling ─────────────────────────────────────────────────────────────
let workbook = null, sheetData = null, fileName = '';

const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const fileInfo = document.getElementById('file-info');
const btnProcess = document.getElementById('btn-process');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const sepInput = document.getElementById('separator');
const previewText = document.getElementById('preview-text');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

sepInput.addEventListener('input', () => {
  previewText.innerHTML = `铁${escHtml(sepInput.value||'/')}Iron`;
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadFile(file) {
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      workbook = XLSX.read(e.target.result, {type:'array'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      sheetData = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      const rows = sheetData.length - 1;
      fileInfo.textContent = `✓ ${file.name}  —  ${rows} 行数据  （工作表: ${workbook.SheetNames[0]}）`;
      fileInfo.classList.remove('hidden');
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step1').classList.add('done');
      step2.classList.add('active');
      step3.classList.add('active');
      btnProcess.disabled = false;
      log('ok', `已加载文件: ${file.name}，共 ${rows} 行`);
    } catch(err) {
      log('err', '文件解析失败: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ─── Process ───────────────────────────────────────────────────────────────────
document.getElementById('btn-process').addEventListener('click', processFile);

function log(type, msg) {
  const logEl = document.getElementById('log');
  logEl.classList.remove('hidden');
  logEl.innerHTML += `<span class="${type}">[${new Date().toLocaleTimeString()}] ${escHtml(msg)}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(pct, msg) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = msg;
}

function processFile() {
  if (!sheetData) return;
  btnProcess.disabled = true;

  const colSrc  = parseInt(document.getElementById('col-source').value);
  const colZh   = parseInt(document.getElementById('col-zhname').value);
  const colH    = parseInt(document.getElementById('col-h').value);
  const colI    = parseInt(document.getElementById('col-i').value);
  const colJ    = parseInt(document.getElementById('col-j').value);
  const sep     = sepInput.value || '/';

  // Ensure all rows have enough columns
  const maxCol  = Math.max(colSrc, colZh, colH, colI, colJ) + 1;
  let total = 0, filled = 0, inferred = 0;

  setProgress(5, '开始处理...');

  // Process asynchronously to allow UI updates
  setTimeout(() => {
    const data = sheetData.map(r => [...r]); // deep copy
    const header = data[0] || [];

    // Ensure header has enough cols and set H, I, J names
    while (header.length <= maxCol) header.push('');
    // Set column headers if blank
    const hNames = ['材质(主)', '英文材质', '材质/Material'];
    [[colH,'材质(主)'],[colI,'英文材质'],[colJ,'材质/Material']].forEach(([ci, name]) => {
      if (!header[ci]) header[ci] = name;
    });
    data[0] = header;

    for (let i = 1; i < data.length; i++) {
      const row = data[i];
      while (row.length <= maxCol) row.push('');

      const matF    = String(row[colSrc]  || '').trim();
      const zhName  = String(row[colZh]   || '').trim();
      const prodName= String(row[11]      || '').trim(); // L col fallback
      const enName  = String(row[1]       || '').trim();
      const sku     = String(row[0]       || '').trim();

      const skip = !sku && !matF && !zhName;
      if (skip) continue;

      total++;
      const [main, wasInferred] = extractMain(matF, zhName, prodName, enName, sku);
      const eng = translate(main);
      const merged = `${main}${sep}${eng}`;

      row[colH] = main;
      row[colI] = eng;
      row[colJ] = merged;

      filled++;
      if (wasInferred) inferred++;
      data[i] = row;

      if (i % 200 === 0) {
        setProgress(5 + Math.round(i/data.length*85), `处理中... ${i}/${data.length-1} 行`);
      }
    }

    setProgress(95, '生成文件...');

    // Write back to sheet
    const ws = XLSX.utils.aoa_to_sheet(data);
    workbook.Sheets[workbook.SheetNames[0]] = ws;
    const out = XLSX.write(workbook, {bookType:'xlsx', type:'array'});
    const blob = new Blob([out], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);

    setProgress(100, '处理完成！');
    log('ok', `处理完成：共 ${total} 行，填充 ${filled} 行（推断 ${inferred} 行）`);

    // Stats
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-filled').textContent = filled;
    document.getElementById('stat-inferred').textContent = inferred;

    // Preview (first 10 rows)
    buildPreview(data, colSrc, colZh, colH, colI, colJ);

    // Download button
    const outName = fileName.replace(/\.xlsx?$/i, '') + '_材质处理.xlsx';
    const dlBtn = document.getElementById('btn-download');
    dlBtn.href = url;
    dlBtn.download = outName;
    dlBtn.textContent = `⬇ 下载 ${outName}`;

    document.getElementById('step4').classList.remove('hidden');
    document.getElementById('step3').classList.add('done');
    btnProcess.disabled = false;
  }, 50);
}

function buildPreview(data, colSrc, colZh, colH, colI, colJ) {
  const head = document.getElementById('preview-head');
  const body = document.getElementById('preview-body');
  head.innerHTML = '';
  body.innerHTML = '';

  const cols = [
    {idx: 0, label: 'SKU'},
    {idx: colZh, label: '中文报关名'},
    {idx: colSrc, label: 'F-原材质'},
    {idx: colH, label: 'H-主材质'},
    {idx: colI, label: 'I-英文'},
    {idx: colJ, label: 'J-合并'},
  ];

  cols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.label;
    head.appendChild(th);
  });

  const previewRows = data.slice(1, 12);
  previewRows.forEach(row => {
    if (!row[0] && !row[colSrc] && !row[colZh]) return;
    const tr = document.createElement('tr');
    cols.forEach(c => {
      const td = document.createElement('td');
      td.textContent = row[c.idx] || '';
      if (c.idx === colJ) td.className = 'highlight';
      else if (c.idx === colSrc) td.className = 'muted';
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}
</script>
